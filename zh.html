<script>
// ─── Constants & State ────────────────────────────────────────────────────────
const SUPPORTED_EXT = new Set(['jpg','jpeg','png','bmp','webp','tif','tiff']);
let pendingFiles = [];
let results      = [];
let processing   = false;

// ─── DOM Ready ────────────────────────────────────────────────────────────────
document.getElementById('folderBtn').addEventListener('click', () => document.getElementById('folderInput').click());
document.getElementById('fileBtn').addEventListener('click',   () => document.getElementById('fileInput').click());
document.getElementById('clearBtn').addEventListener('click',  clearAll);
document.getElementById('startBtn').addEventListener('click',  startCompression);
document.getElementById('downloadBtn').addEventListener('click', downloadZip);

// ─── File Input Handlers ──────────────────────────────────────────────────────
document.getElementById('folderInput').addEventListener('change', e => {
  const files = Array.from(e.target.files).map(f => ({
    file: f,
    relativePath: f.webkitRelativePath || f.name
  }));
  addFiles(files);
  e.target.value = '';
});

document.getElementById('fileInput').addEventListener('change', e => {
  const files = Array.from(e.target.files).map(f => ({ file: f, relativePath: f.name }));
  addFiles(files);
  e.target.value = '';
});

// ─── Drag & Drop ──────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('drag-over'); });
dropZone.addEventListener('drop', async e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = [];
  for (const item of Array.from(e.dataTransfer.items)) {
    const entry = item.webkitGetAsEntry && item.webkitGetAsEntry();
    if (entry) await readEntry(entry, '', files);
  }
  addFiles(files);
});

async function readEntry(entry, basePath, acc) {
  if (entry.isFile) {
    const file = await new Promise((res, rej) => entry.file(res, rej));
    acc.push({ file, relativePath: basePath + entry.name });
  } else if (entry.isDirectory) {
    const reader = entry.createReader();
    let batch;
    do {
      batch = await new Promise((res, rej) => reader.readEntries(res, rej));
      for (const child of batch) await readEntry(child, basePath + entry.name + '/', acc);
    } while (batch.length > 0);
  }
}

// ─── File List Management ─────────────────────────────────────────────────────
function addFiles(newFiles) {
  if (processing) return;
  const filtered = newFiles.filter(({ file }) => SUPPORTED_EXT.has(file.name.split('.').pop().toLowerCase()));
  if (filtered.length === 0 && newFiles.length > 0) {
    alert('未找到支持的图片文件。\n支持格式：JPG、PNG、BMP、WebP');
    return;
  }
  pendingFiles = pendingFiles.concat(filtered);
  renderFileTable();
  document.getElementById('fileListCard').classList.remove('hidden');
  document.getElementById('summaryCard').classList.add('hidden');
}

function makeStatusBadge(type, text) {
  const span = document.createElement('span');
  span.className = 'status-badge status-' + type;
  span.textContent = text;
  return span;
}

function clearChildren(el) {
  while (el.firstChild) el.removeChild(el.firstChild);
}

function renderFileTable() {
  const tbody = document.getElementById('fileTableBody');
  clearChildren(tbody);
  for (let i = 0; i < pendingFiles.length; i++) {
    const { file, relativePath } = pendingFiles[i];
    const tr = document.createElement('tr');
    tr.id = 'row-' + i;

    const tdName = document.createElement('td');
    tdName.className = 'td-name';
    tdName.title = relativePath;
    tdName.textContent = relativePath;

    const tdOrig = document.createElement('td');
    tdOrig.className = 'td-num';
    tdOrig.textContent = fmtMB(file.size);

    const tdResult = document.createElement('td');
    tdResult.className = 'td-num';
    tdResult.id = 'td-result-' + i;
    tdResult.textContent = '\u2014';

    const tdRatio = document.createElement('td');
    tdRatio.className = 'td-num';
    tdRatio.id = 'td-ratio-' + i;
    tdRatio.textContent = '\u2014';

    const tdStatus = document.createElement('td');
    tdStatus.id = 'td-status-' + i;
    tdStatus.appendChild(makeStatusBadge('wait', '等待中'));

    tr.appendChild(tdName);
    tr.appendChild(tdOrig);
    tr.appendChild(tdResult);
    tr.appendChild(tdRatio);
    tr.appendChild(tdStatus);
    tbody.appendChild(tr);
  }
  document.getElementById('fileCount').textContent = pendingFiles.length + ' 个文件';
}

function clearAll() {
  if (processing) return;
  pendingFiles = [];
  results = [];
  document.getElementById('fileListCard').classList.add('hidden');
  document.getElementById('progressCard').classList.add('hidden');
  document.getElementById('summaryCard').classList.add('hidden');
  clearChildren(document.getElementById('fileTableBody'));
}

// ─── Compression Orchestrator ─────────────────────────────────────────────────
async function startCompression() {
  if (processing || pendingFiles.length === 0) return;
  processing = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('clearBtn').disabled = true;
  document.getElementById('progressCard').classList.remove('hidden');
  document.getElementById('summaryCard').classList.add('hidden');
  results = [];

  const maxSizeMB = parseFloat(document.getElementById('maxSize').value) || 10;
  const total = pendingFiles.length;
  let totalOrig = 0, totalResult = 0;

  for (let i = 0; i < total; i++) {
    const { file, relativePath } = pendingFiles[i];
    setProgress(i, total, relativePath);
    updateRowStatus(i, 'wait', true);

    try {
      const res = await compressImage(file, maxSizeMB);
      totalOrig   += file.size;
      totalResult += res.blob.size;

      const ratio  = file.size > 0 ? (1 - res.blob.size / file.size) * 100 : 0;
      let outPath  = relativePath;
      if (res.ext) outPath = relativePath.replace(/\.[^.]+$/, res.ext);

      results.push({ relativePath: outPath, blob: res.blob, originalSize: file.size, resultSize: res.blob.size, skipped: res.skipped });

      document.getElementById('td-result-' + i).textContent = fmtMB(res.blob.size);
      document.getElementById('td-ratio-'  + i).textContent = res.skipped ? '\u2014' : '-' + ratio.toFixed(1) + '%';
      updateRowStatus(i, res.skipped ? 'skip' : 'ok', false, res.skipped ? '直接复制' : '完成');
    } catch (err) {
      results.push({ relativePath, blob: null, originalSize: file.size, resultSize: 0, error: err.message });
      document.getElementById('td-result-' + i).textContent = '错误';
      document.getElementById('td-ratio-'  + i).textContent = '\u2014';
      updateRowStatus(i, 'err', false, '错误');
    }
  }

  setProgress(total, total, '完成');
  showSummary(totalOrig, totalResult, total);
  processing = false;
  document.getElementById('startBtn').disabled = false;
  document.getElementById('clearBtn').disabled = false;
}

function setProgress(current, total, filename) {
  const pct = total > 0 ? (current / total) * 100 : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  const label = document.getElementById('progressLabel');
  if (current < total) {
    label.textContent = '[' + (current + 1) + '/' + total + '] 正在处理 ' + filename + '...';
  } else {
    label.textContent = '完成（共 ' + total + ' 个文件）';
  }
}

function updateRowStatus(i, type, spinning, text) {
  const td = document.getElementById('td-status-' + i);
  if (!td) return;
  clearChildren(td);
  if (spinning) {
    const sp = document.createElement('span');
    sp.className = 'spinner';
    td.appendChild(sp);
  }
  td.appendChild(makeStatusBadge(type, text || (spinning ? '处理中' : '')));
}

function showSummary(totalOrig, totalResult, count) {
  const ratio = totalOrig > 0 ? (1 - totalResult / totalOrig) * 100 : 0;
  document.getElementById('summaryMain').textContent =
    '完成：' + fmtMB(totalOrig) + ' \u2192 ' + fmtMB(totalResult) + '（共减少 ' + ratio.toFixed(1) + '%）';
  document.getElementById('summarySub').textContent = '已处理 ' + count + ' 个文件';
  document.getElementById('summaryCard').classList.remove('hidden');
}

// ─── Image Compression Core ───────────────────────────────────────────────────
function loadImage(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload  = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('图片加载失败')); };
    img.src = url;
  });
}

function imgToCanvas(img, w, h) {
  const c = document.createElement('canvas');
  c.width  = w;
  c.height = h;
  c.getContext('2d').drawImage(img, 0, 0, w, h);
  return c;
}

function canvasToBlob(canvas, type, quality) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(b => b ? resolve(b) : reject(new Error('编码失败')), type, quality);
  });
}

function hasAlpha(canvas) {
  const data = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height).data;
  for (let i = 3; i < data.length; i += 4) if (data[i] < 255) return true;
  return false;
}

async function compressImage(file, maxSizeMB) {
  const maxBytes = maxSizeMB * 1024 * 1024;
  if (file.size <= maxBytes) return { blob: file, skipped: true, ext: null };

  const img   = await loadImage(file);
  const W = img.naturalWidth, H = img.naturalHeight;
  const canvas = imgToCanvas(img, W, H);

  if (hasAlpha(canvas)) {
    return { blob: await compressPNG(img, W, H, maxBytes), skipped: false, ext: '.png' };
  } else {
    return { blob: await compressJPEG(img, W, H, maxBytes), skipped: false, ext: '.jpg' };
  }
}

async function findBestJPEGQuality(img, w, h, maxBytes, low, high) {
  let best = low;
  while (low <= high) {
    const mid    = (low + high) >> 1;
    const canvas = imgToCanvas(img, w, h);
    const blob   = await canvasToBlob(canvas, 'image/jpeg', mid / 100);
    if (blob.size <= maxBytes) { best = mid; low  = mid + 1; }
    else                       { high = mid - 1; }
  }
  return best;
}

async function compressJPEG(img, W, H, maxBytes) {
  const q0 = await findBestJPEGQuality(img, W, H, maxBytes, 30, 95);
  const b0  = await canvasToBlob(imgToCanvas(img, W, H), 'image/jpeg', q0 / 100);
  if (b0.size <= maxBytes) return b0;

  for (const scale of [0.9, 0.8, 0.7, 0.6, 0.5, 0.4, 0.3, 0.2]) {
    const nw = Math.max(1, Math.floor(W * scale));
    const nh = Math.max(1, Math.floor(H * scale));
    const q  = await findBestJPEGQuality(img, nw, nh, maxBytes, 30, 95);
    const b  = await canvasToBlob(imgToCanvas(img, nw, nh), 'image/jpeg', q / 100);
    if (b.size <= maxBytes) return b;
  }

  return canvasToBlob(imgToCanvas(img, Math.max(1, Math.floor(W * 0.2)), Math.max(1, Math.floor(H * 0.2))), 'image/jpeg', 0.01);
}

async function compressPNG(img, W, H, maxBytes) {
  const b0 = await canvasToBlob(imgToCanvas(img, W, H), 'image/png');
  if (b0.size <= maxBytes) return b0;

  for (const scale of [0.9, 0.8, 0.7, 0.6, 0.5, 0.4, 0.3, 0.2]) {
    const nw = Math.max(1, Math.floor(W * scale));
    const nh = Math.max(1, Math.floor(H * scale));
    const b  = await canvasToBlob(imgToCanvas(img, nw, nh), 'image/png');
    if (b.size <= maxBytes) return b;
  }

  return canvasToBlob(imgToCanvas(img, Math.max(1, Math.floor(W * 0.2)), Math.max(1, Math.floor(H * 0.2))), 'image/png');
}

// ─── ZIP Builder ──────────────────────────────────────────────────────────────
async function deflateData(data) {
  if (typeof CompressionStream === 'undefined') return { out: data, method: 0 };
  try {
    const cs     = new CompressionStream('deflate-raw');
    const writer = cs.writable.getWriter();
    const reader = cs.readable.getReader();

    const [, chunks] = await Promise.all([
      (async () => { await writer.write(data); await writer.close(); })(),
      (async () => {
        const buf = [];
        for (;;) {
          const { done, value } = await reader.read();
          if (done) break;
          buf.push(value);
        }
        return buf;
      })(),
    ]);

    let len = 0;
    for (const c of chunks) len += c.length;
    const out = new Uint8Array(len);
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return { out, method: 8 };
  } catch (_) {
    return { out: data, method: 0 };
  }
}

const CRC_TABLE = (() => {
  const t = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let v = i;
    for (let j = 0; j < 8; j++) v = (v & 1) ? (0xEDB88320 ^ (v >>> 1)) : (v >>> 1);
    t[i] = v;
  }
  return t;
})();

function crc32(buf) {
  let c = 0xFFFFFFFF;
  for (let i = 0; i < buf.length; i++) c = CRC_TABLE[(c ^ buf[i]) & 0xFF] ^ (c >>> 8);
  return (c ^ 0xFFFFFFFF) >>> 0;
}

function w16(n) { return [(n) & 0xFF, (n >> 8) & 0xFF]; }
function w32(n) { return [(n) & 0xFF, (n >> 8) & 0xFF, (n >> 16) & 0xFF, (n >> 24) & 0xFF]; }

async function buildZip(entries) {
  const enc          = new TextEncoder();
  const localParts   = [];
  const centralParts = [];
  let offset         = 0;
  let count          = 0;

  for (const { path, blob } of entries) {
    const nameBytes = enc.encode(path);
    const raw       = new Uint8Array(await blob.arrayBuffer());
    const crc       = crc32(raw);
    const { out: compressed, method } = await deflateData(raw);

    const lh = new Uint8Array([
      0x50, 0x4B, 0x03, 0x04,
      ...w16(20), ...w16(0), ...w16(method),
      ...w16(0), ...w16(0),
      ...w32(crc),
      ...w32(compressed.length),
      ...w32(raw.length),
      ...w16(nameBytes.length),
      ...w16(0),
    ]);
    localParts.push(lh, nameBytes, compressed);
    const entrySize = lh.length + nameBytes.length + compressed.length;

    const cd = new Uint8Array([
      0x50, 0x4B, 0x01, 0x02,
      ...w16(20), ...w16(20), ...w16(0), ...w16(method),
      ...w16(0), ...w16(0),
      ...w32(crc),
      ...w32(compressed.length),
      ...w32(raw.length),
      ...w16(nameBytes.length),
      ...w16(0), ...w16(0),
      ...w16(0), ...w16(0), ...w32(0),
      ...w32(offset),
    ]);
    centralParts.push(cd, nameBytes);

    offset += entrySize;
    count++;
  }

  let centralLen = 0;
  for (const p of centralParts) centralLen += p.length;

  const eocd = new Uint8Array([
    0x50, 0x4B, 0x05, 0x06,
    ...w16(0), ...w16(0),
    ...w16(count), ...w16(count),
    ...w32(centralLen), ...w32(offset),
    ...w16(0),
  ]);

  return new Blob([...localParts, ...centralParts, eocd], { type: 'application/zip' });
}

// ─── Download ─────────────────────────────────────────────────────────────────
async function downloadZip() {
  const btn = document.getElementById('downloadBtn');
  btn.disabled    = true;
  btn.textContent = '\u23f3 正在生成 ZIP...';

  try {
    const valid   = results.filter(r => r.blob !== null);
    const entries = valid.map(r => ({ path: r.relativePath, blob: r.blob }));
    const zipBlob = await buildZip(entries);

    const url = URL.createObjectURL(zipBlob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = 'images_compressed.zip';
    document.body.appendChild(a);
    a.click();
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 60000);

    btn.textContent = '\u2b07 下载 ZIP (' + fmtMB(zipBlob.size) + ')';
  } catch (err) {
    console.error('ZIP download error:', err);
    alert('ZIP 生成错误：' + err.message);
    btn.textContent = '\u2b07 下载 ZIP';
  }
  btn.disabled = false;
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function fmtMB(bytes) {
  const mb = bytes / (1024 * 1024);
  if (mb >= 100) return mb.toFixed(0) + ' MB';
  if (mb >= 10)  return mb.toFixed(1) + ' MB';
  if (mb >= 1)   return mb.toFixed(2) + ' MB';
  return (bytes / 1024).toFixed(1) + ' KB';
}
